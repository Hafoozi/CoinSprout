<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#0F7A3B"/>
    </linearGradient>

    <!-- Coin gradient -->
    <radialGradient id="coinGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </radialGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Coin -->
  <circle cx="235" cy="320" r="90" fill="url(#coinGrad)"/>
  <circle cx="235" cy="320" r="70" fill="none" stroke="#CA8A04" stroke-width="10"/>

  <!-- Stem -->
  <path d="M235 260 
           C240 235, 270 210, 320 175"
        stroke="#14532D"
        stroke-width="16"
        stroke-linecap="round"
        fill="none"/>

  <!-- Left leaf -->
  <path d="M270 190
           C240 175, 210 185, 210 215
           C245 220, 260 205, 270 190 Z"
        fill="url(#leafGrad)"/>

  <!-- Right leaf -->
  <path d="M320 175
           C370 150, 410 170, 410 215
           C360 225, 330 205, 320 175 Z"
        fill="url(#leafGrad)"/>

</svg>